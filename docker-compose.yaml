version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dept_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dept_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dept_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dept_app
    ports:
      - "8000:8000"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=dept_db
      - DB_PORT=5432
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy